  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Playfair+Display:wght@400;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #faf5f0;
      color: #2c2416;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teaser {
      text-align: center;
      max-width: 600px;
      padding: 40px 24px;
    }

    .teaser-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: #3d2e1e;
      margin-bottom: 8px;
    }

    .heart-o {
      color: #B794D6;
      font-size: 0.85em;
      line-height: 1;
      display: inline-block;
      transform: translateY(0.05em);
    }

    .teaser-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #7a6650;
      margin-bottom: 48px;
    }

    .teaser h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.25;
      color: #3d2e1e;
      margin-bottom: 20px;
    }

    .teaser-sub {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #5a4e3f;
      margin-bottom: 40px;
    }

    .signup-form {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 480px;
      margin: 0 auto 16px;
    }

    .signup-form input[type="email"] {
      flex: 1;
      min-width: 200px;
      padding: 14px 20px;
      border-radius: 50px;
      border: 2px solid #d4c8b8;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .signup-form input[type="email"]:focus {
      border-color: #9370B8;
    }

    .signup-form button {
      padding: 14px 28px;
      border-radius: 50px;
      border: none;
      background: #C67A4B;
      color: #fff;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .signup-form button:hover {
      background: #D4885A;
    }

    .signup-note {
      font-size: 0.8rem;
      color: #a89a8a;
    }

    .teaser-decoration {
      margin-top: 60px;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .teaser-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #B794D6;
      opacity: 0.4;
    }

    .teaser-dot:nth-child(2) { opacity: 0.6; width: 10px; height: 10px; }
    .teaser-dot:nth-child(3) { opacity: 0.3; width: 6px; height: 6px; }
    .teaser-dot:nth-child(4) { opacity: 0.5; width: 9px; height: 9px; }
    .teaser-dot:nth-child(5) { opacity: 0.25; width: 7px; height: 7px; }
  </style>
</head>
<body>
  <div class="teaser">
    <div class="teaser-logo">
      I L<span class="heart-o">&hearts;&#xFE0E;</span>ve Claremont
    </div>
    <p class="teaser-tagline">The City of Trees and PhDs</p>

    <h1>A Local's Guide to the City of Trees and PhDs</h1>
    <p class="teaser-sub">Honest guides to Claremont dining, coffee, parks, neighborhoods, and more — by someone who actually lives here.</p>

    <form class="signup-form" action="https://buttondown.com/api/emails/embed-subscribe/iloveclaremontca" method="POST" target="_blank">
      <input type="email" name="email" placeholder="Your email" required aria-label="Email address">
      <button type="submit">Notify Me</button>
    </form>
    <p class="signup-note">Be the first to explore when we launch.</p>

    <div class="teaser-decoration">
      <span class="teaser-dot"></span>
      <span class="teaser-dot"></span>
      <span class="teaser-dot"></span>
      <span class="teaser-dot"></span>
      <span class="teaser-dot"></span>
    </div>
  </div>
</body>
</html>
